# /etc/nginx/sites-available/dotcursor.conf
# Reverse-proxy: dotcursor.ru -> Next.js (localhost:3000)
# HTTPS-блоки добавит certbot автоматически (certbot --nginx).

server {
    listen 80;
    listen [::]:80;
    server_name dotcursor.ru www.dotcursor.ru;

    # www -> apex
    if ($host = www.dotcursor.ru) {
        return 301 https://dotcursor.ru$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # статика Next.js — кэшируем агрессивно (имена файлов хэшированы)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # медиа из public/ (видео, обложки)
    location ~* \.(mp4|webm|jpg|jpeg|png|webp|svg|ico|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
    }

    client_max_body_size 32m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
